<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Alerts - National Weather Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #1a3a5c;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #dce4ec;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            text-transform: uppercase;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #1a3a5c;
        }

        button {
            padding: 12px 24px;
            background-color: #1a3a5c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            white-space: nowrap;
        }

        button:hover {
            background-color: #2a5a7c;
        }

        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        #loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
            font-style: italic;
        }

        #loading.show {
            display: block;
        }

        #alert-container {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }

        #alert-container.show {
            display: block;
        }

        #alert-container.success {
            background-color: #e8f5e9;
            border: 1px solid #4caf50;
        }

        #alert-container.error {
            background-color: #ffebee;
            border: 1px solid #f44336;
        }

        #alert-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a3a5c;
            margin-bottom: 12px;
        }

        #alert-count {
            font-size: 14px;
            color: #555;
            margin-bottom: 12px;
        }

        #alert-list {
            list-style: none;
            padding: 0;
        }

        #alert-list li {
            padding: 12px 14px;
            margin-bottom: 8px;
            background-color: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #1a3a5c;
            font-size: 14px;
            color: #333;
        }

        #alert-list li .headline {
            font-weight: 600;
        }

        #alert-list li .details {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .error-message {
            color: #d32f2f;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .state-examples {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .state-examples span {
            display: inline-block;
            background: #f0f4f8;
            padding: 2px 10px;
            border-radius: 4px;
            margin: 2px 4px;
            font-weight: 600;
            color: #1a3a5c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛅ Weather Alerts</h1>
        <p class="subtitle">Enter a U.S. state abbreviation to get current weather watches, warnings, and advisories.</p>

        <div class="input-group">
            <input type="text" id="state-input" placeholder="e.g., NY, CA, TX" maxlength="2" />
            <button id="fetch-btn">Get Alerts</button>
        </div>
        <div class="state-examples">
            Examples: <span>NY</span> <span>CA</span> <span>TX</span> <span>FL</span> <span>IL</span>
        </div>

        <div id="loading">Loading alerts...</div>

        <div id="alert-container">
            <div id="alert-title"></div>
            <div id="alert-count"></div>
            <ul id="alert-list"></ul>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
